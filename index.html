<!doctype html>
<html lang="en">
  <head>
    <script>
      // Workaround for environments where window.fetch cannot be overwritten directly due to getter-only property descriptors
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchVal = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return fetchVal; },
            set: function(val) { fetchVal = val; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn('SnapNote: Safe-patching window.fetch descriptor failed:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
